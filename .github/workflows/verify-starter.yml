# TEMPORARY verification workflow — NOT part of the course.
# It proves the ShipIt starter compiles, tests pass, and the app runs.
# Push this repo to a scratch GitHub repo and watch this go green, then DELETE
# this file before publishing the repo as the student template (students author
# their own ci.yml in Module 2 / Lab 2).
name: Verify Starter (temporary)

on:
  push:
  workflow_dispatch:

jobs:
  build-test-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Smoke test (run the app and hit the endpoints)
        run: |
          set -euo pipefail

          wait_up()   { for _ in $(seq 1 30); do curl -fsS http://localhost:8080/healthz >/dev/null 2>&1 && return 0; sleep 1; done; return 1; }
          stop_app()  { kill "$1" 2>/dev/null || true; wait "$1" 2>/dev/null || true; }
          wait_down() { for _ in $(seq 1 30); do curl -fsS http://localhost:8080/healthz >/dev/null 2>&1 || return 0; sleep 1; done; return 1; }

          # ---- default (ready) ----
          dotnet run --project src/ShipIt -c Release --no-build &
          APP_PID=$!
          wait_up
          echo "healthz: $(curl -fsS http://localhost:8080/healthz)"
          echo "readyz:  $(curl -fsS http://localhost:8080/readyz)"
          echo "shipments count: $(curl -fsS http://localhost:8080/api/shipments | grep -o '\"id\"' | wc -l)"
          stop_app "$APP_PID"
          wait_down   # make sure port 8080 is released before starting the next instance

          # ---- readiness should flip to 503 when SHIPIT_READY=false ----
          SHIPIT_READY=false dotnet run --project src/ShipIt -c Release --no-build &
          APP_PID=$!
          wait_up
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/readyz)
          echo "readyz with SHIPIT_READY=false -> $code"
          stop_app "$APP_PID"
          test "$code" = "503"
